<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hibachi Mana 2026 Birthday </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('/images/manafestialoadingpage.png') center center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #65d1ff, #8ce6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #a0a0a0;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }

    .language-section {
      margin-bottom: 2rem;
    }

    .language-label {
      display: block;
      margin-bottom: 1rem;
      font-size: 1rem;
      color: #ccc;
    }

    .language-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
    }

    .lang-btn {
      padding: 0.75rem 1.5rem;
      border: 2px solid #54c7fd;
      background: transparent;
      color: #fff;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .lang-btn:hover {
      background: rgba(77, 69, 233, 0.2);
    }

    .lang-btn.active {
      background: #6fd9ff;
      color: #fff;
    }

    .start-btn {
      padding: 1rem 3rem;
      font-size: 1.3rem;
      background: linear-gradient(90deg, #6fd9ff, #6fd9ff);
      border: none;
      color: #fff;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(69, 140, 233, 0.4);
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(69, 121, 233, 0.6);
    }

    .start-btn:active {
      transform: translateY(-1px);
    }

    .decoration {
      position: fixed;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(233, 69, 96, 0.1);
      z-index: -1;
    }

    .decoration-1 {
      top: -100px;
      left: -100px;
    }

    .decoration-2 {
      bottom: -100px;
      right: -100px;
      background: rgba(15, 52, 96, 0.3);
    }
  </style>
</head>
<body>
  <div class="decoration decoration-1"></div>
  <div class="decoration decoration-2"></div>
  
  <div class="container">
    <h1 data-i18n="landing.title">Mini Games Arcade</h1>
    <p class="subtitle" data-i18n="landing.subtitle">Choose your language and start playing!</p>
    
    <div class="language-section">
      <label class="language-label" data-i18n="landing.selectLanguage">Select Language</label>
      <div class="language-buttons">
        <button class="lang-btn active" data-lang="en" data-i18n="landing.english">English</button>
        <button class="lang-btn" data-lang="jp" data-i18n="landing.japanese">Japanese</button>
      </div>
    </div>
    
    <button class="start-btn" onclick="window.location.href='/mainpage.html'" data-i18n="landing.startButton">
      Start Playing
    </button>
  </div>

  <script src="/js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.init();
      
      // Update active button based on current language
      const langButtons = document.querySelectorAll('.lang-btn');
      langButtons.forEach(btn => {
        if (btn.dataset.lang === i18n.currentLang) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
        
        btn.addEventListener('click', async () => {
          langButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          await i18n.loadLanguage(btn.dataset.lang);
        });
      });
    });
  </script>
</body>
</html>
