<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Selection</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 800px;
      width: 100%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #a0a0a0;
      margin-bottom: 3rem;
      font-size: 1.2rem;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .game-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      text-decoration: none;
      color: #fff;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-10px);
      border-color: #e94560;
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.3);
    }

    .game-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .game-title {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #e94560;
    }

    .game-desc {
      color: #a0a0a0;
      font-size: 0.95rem;
    }

    .snake-icon {
      color: #4ade80;
    }

    .pong-icon {
      color: #60a5fa;
    }

    .back-btn {
      padding: 0.75rem 2rem;
      background: transparent;
      border: 2px solid #e94560;
      color: #fff;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .back-btn:hover {
      background: #e94560;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 data-i18n="mainpage.title">Game Selection</h1>
    <p class="subtitle" data-i18n="mainpage.subtitle">Choose a game to play</p>
    
    <div class="games-grid">
      <a href="/games/snake/index.html" class="game-card">
        <div class="game-icon snake-icon">🐍</div>
        <h2 class="game-title" data-i18n="mainpage.snake">Snake</h2>
        <p class="game-desc" data-i18n="mainpage.snakeDesc">Classic snake game - eat food and grow!</p>
      </a>
      
      <a href="/games/pong/pong.html" class="game-card">
        <div class="game-icon pong-icon">🏓</div>
        <h2 class="game-title" data-i18n="mainpage.pong">Pong</h2>
        <p class="game-desc" data-i18n="mainpage.pongDesc">Classic pong game - beat your opponent!</p>
      </a>
    </div>
    
    <a href="/index.html" class="back-btn" data-i18n="mainpage.backButton">Back to Home</a>
  </div>

  <script src="/js/i18n.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.init();
    });
  </script>
</body>
</html>
