<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      padding: 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #4ade80, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .instructions {
      color: #a0a0a0;
      font-size: 0.9rem;
    }

    .score-board {
      display: flex;
      gap: 2rem;
      margin-bottom: 1rem;
    }

    .score-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      text-align: center;
    }

    .score-label {
      font-size: 0.85rem;
      color: #a0a0a0;
      margin-bottom: 0.25rem;
    }

    .score-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #4ade80;
    }

    .game-container {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    canvas {
      display: block;
      border-radius: 10px;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 15px;
      gap: 1rem;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h2 {
      font-size: 2rem;
      color: #e94560;
    }

    .overlay p {
      font-size: 1.2rem;
      color: #fff;
    }

    .btn {
      padding: 0.75rem 2rem;
      font-size: 1rem;
      background: linear-gradient(90deg, #4ade80, #22c55e);
      border: none;
      color: #fff;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid #4ade80;
    }

    .back-link {
      margin-top: 1.5rem;
      color: #a0a0a0;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 data-i18n="snake.title">Snake Game</h1>
    <p class="instructions" data-i18n="snake.instructions">Use arrow keys or WASD to move</p>
  </div>
  
  <div class="score-board">
    <div class="score-item">
      <div class="score-label" data-i18n="snake.score">Score</div>
      <div class="score-value" id="score">0</div>
    </div>
    <div class="score-item">
      <div class="score-label" data-i18n="snake.highScore">High Score</div>
      <div class="score-value" id="high-score">0</div>
    </div>
  </div>
  
  <div class="game-container">
    <canvas id="game-canvas" width="400" height="400"></canvas>
    
    <div class="overlay" id="start-overlay">
      <h2 data-i18n="snake.title">Snake Game</h2>
      <button class="btn" onclick="startGame()" data-i18n="snake.startGame">Start Game</button>
    </div>
    
    <div class="overlay hidden" id="game-over-overlay">
      <h2 data-i18n="snake.gameOver">Game Over!</h2>
      <p><span data-i18n="snake.score">Score</span>: <span id="final-score">0</span></p>
      <button class="btn" onclick="playAgain()" data-i18n="snake.playAgain">Play Again</button>
      <a href="/mainpage.html" class="btn btn-secondary" data-i18n="snake.backToMenu">Back to Menu</a>
    </div>
  </div>
  
  <a href="/mainpage.html" class="back-link" data-i18n="snake.backToMenu">← Back to Menu</a>

  <script src="/js/i18n.js"></script>
  <script src="/js/snake.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.init();
    });
  </script>
</body>
</html>
