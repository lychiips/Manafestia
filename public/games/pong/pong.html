<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      padding: 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .instructions {
      color: #a0a0a0;
      font-size: 0.9rem;
    }

    .score-board {
      display: flex;
      gap: 3rem;
      margin-bottom: 1rem;
      align-items: center;
    }

    .player-score {
      text-align: center;
    }

    .player-label {
      font-size: 0.85rem;
      color: #a0a0a0;
      margin-bottom: 0.25rem;
    }

    .player1-label .player-label {
      color: #e94560;
    }

    .player2-label .player-label {
      color: #60a5fa;
    }

    .score-value {
      font-size: 2.5rem;
      font-weight: bold;
    }

    .player1-score {
      color: #e94560;
    }

    .player2-score {
      color: #60a5fa;
    }

    .vs {
      font-size: 1.2rem;
      color: #666;
    }

    .game-container {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    canvas {
      display: block;
      border-radius: 10px;
    }

    .controls {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 15px;
      gap: 1rem;
    }

    .overlay.hidden {
      display: none;
    }

    .overlay h2 {
      font-size: 2rem;
      color: #60a5fa;
    }

    .overlay p {
      font-size: 1.2rem;
      color: #fff;
    }

    .winner-text {
      color: #4ade80;
      font-weight: bold;
    }

    .btn {
      padding: 0.75rem 2rem;
      font-size: 1rem;
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
      border: none;
      color: #fff;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid #60a5fa;
    }

    .btn-pause {
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;
    }

    .back-link {
      margin-top: 1.5rem;
      color: #a0a0a0;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 data-i18n="pong.title">Pong Game</h1>
    <p class="instructions" data-i18n="pong.instructions">Use W/S keys to move your paddle</p>
  </div>
  
  <div class="score-board">
    <div class="player-score player1-label">
      <div class="player-label" data-i18n="pong.player1">Player 1</div>
      <div class="score-value player1-score" id="player1-score">0</div>
    </div>
    <div class="vs">VS</div>
    <div class="player-score player2-label">
      <div class="player-label" data-i18n="pong.player2">Player 2 (AI)</div>
      <div class="score-value player2-score" id="player2-score">0</div>
    </div>
  </div>
  
  <div class="game-container">
    <canvas id="game-canvas" width="600" height="400"></canvas>
    
    <div class="overlay" id="start-overlay">
      <h2 data-i18n="pong.title">Pong Game</h2>
      <p data-i18n="pong.instructions">Use W/S keys to move your paddle</p>
      <button class="btn" onclick="startGame()" data-i18n="pong.startGame">Start Game</button>
    </div>
    
    <div class="overlay hidden" id="game-over-overlay">
      <h2 data-i18n="pong.gameOver">Game Over!</h2>
      <p><span data-i18n="pong.winner">Winner</span>: <span class="winner-text" id="winner-text">Player 1</span></p>
      <button class="btn" onclick="playAgain()" data-i18n="pong.playAgain">Play Again</button>
      <a href="/mainpage.html" class="btn btn-secondary" data-i18n="pong.backToMenu">Back to Menu</a>
    </div>
  </div>
  
  <div class="controls">
    <button class="btn btn-pause hidden" id="pause-btn" onclick="togglePause()" data-i18n="pong.pause">Pause</button>
  </div>
  
  <a href="/mainpage.html" class="back-link" data-i18n="pong.backToMenu">← Back to Menu</a>

  <script src="/js/i18n.js"></script>
  <script src="/js/pong.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await i18n.init();
    });
  </script>
</body>
</html>
